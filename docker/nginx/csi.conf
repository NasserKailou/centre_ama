server {
    listen 80;
    server_name _;

    root /var/www/html/public;
    index index.php;

    # Security headers
    add_header X-Frame-Options           "SAMEORIGIN"   always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header X-Content-Type-Options    "nosniff"      always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    # Cache assets statiques
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Health check
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # Point d'entrée Symfony
    location / {
        try_files $uri $uri/ /index.php$is_args$args;
    }

    # PHP-FPM
    location ~ ^/index\.php(/|$) {
        fastcgi_pass   127.0.0.1:9000;
        fastcgi_split_path_info ^(.+\.php)(/.*)$;

        include        fastcgi_params;
        fastcgi_param  SCRIPT_FILENAME  $realpath_root$fastcgi_script_name;
        fastcgi_param  DOCUMENT_ROOT    $realpath_root;

        fastcgi_read_timeout    60;
        fastcgi_connect_timeout 60;
        fastcgi_send_timeout    60;

        internal;
    }

    # Bloquer l'accès direct aux .php (sauf index.php)
    location ~ \.php$ {
        return 404;
    }

    # Bloquer l'accès aux fichiers sensibles
    location ~* \.(env|git|gitignore|htaccess|yaml|yml|json|lock|md)$ {
        deny all;
        return 404;
    }

    # Logs
    error_log  /var/log/nginx/csi_error.log;
    access_log /var/log/nginx/csi_access.log;
}
