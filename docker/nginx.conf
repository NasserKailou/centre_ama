worker_processes auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections 1024;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    server_tokens   off;
    gzip            on;
    gzip_types      text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1024;

    server {
        listen 80;
        server_name _;
        root /var/www/html/public;
        index index.php;

        # Logs
        access_log /var/log/nginx/access.log main;
        error_log  /var/log/nginx/error.log;

        # Sécurité headers
        add_header X-Frame-Options "SAMEORIGIN"        always;
        add_header X-XSS-Protection "1; mode=block"   always;
        add_header X-Content-Type-Options "nosniff"    always;
        add_header Referrer-Policy "strict-origin"     always;

        # Fichiers statiques — cache long
        location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires     30d;
            add_header  Cache-Control "public, immutable";
            access_log  off;
            try_files   $uri =404;
        }

        # Uploads
        location /uploads/ {
            alias /var/www/html/public/uploads/;
            expires 7d;
            add_header Cache-Control "public";
        }

        # Interdire accès aux fichiers sensibles
        location ~ /\. { deny all; }
        location ~ /(composer\.(json|lock)|package\.json|\.env)$ { deny all; return 403; }

        # Routing Symfony
        location / {
            try_files $uri /index.php$is_args$args;
        }

        # PHP-FPM
        location ~ ^/index\.php(/|$) {
            fastcgi_pass   unix:/var/run/php-fpm.sock;
            fastcgi_split_path_info ^(.+\.php)(/.*)$;
            include        fastcgi_params;
            fastcgi_param  SCRIPT_FILENAME  $realpath_root$fastcgi_script_name;
            fastcgi_param  DOCUMENT_ROOT    $realpath_root;
            fastcgi_buffer_size             16k;
            fastcgi_buffers                 4 16k;
            internal;
        }

        # Refuser tout autre PHP
        location ~ \.php$ { return 404; }

        # Limite de taille d'upload
        client_max_body_size 64M;
    }
}
